<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Splora AI Chatbot</title>
    <style>
        #chat-container {
            width: 400px;
            height: 500px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        #message-input {
            display: flex;
        }
    </style>
    <link rel="stylesheet" href="chat-style.css">

</head>
<script src="https://kit.fontawesome.com/a2c3bd25a5.js" crossorigin="anonymous"></script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker/dist/js/bootstrap-datepicker.min.js"></script>

<body>
    <div class="chat-container" id="chat-window">
        <div class="chat-header">
            <div class="user-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="col ms-4 user-name">
                <div class="row" style="font-size: smaller; font-weight: lighter;">Text with</div>
                <div class="row"> Splora </div>
            </div>
            <div id="close-chat">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div class="chat-history" id="message-queue" style="background-color: aliceblue;">
            <div class="message received">
                <p>Hello there, I am Splora! 👋 If you have any questions about the Women Tech EU, I'm here to help.
                Here are some of the questions you can ask:
                <button type="button" class="btn btn-outline-light" onclick="sendMessage('Who can participate?')">Who can participate?</button>
                <button type="button" class="btn btn-outline-light" onclick="sendMessage('Where should I upload the video pitch?')">Where should I upload the video pitch?</button>
                <button type="button" class="btn btn-outline-light" onclick="sendMessage('What is Social Transition in Women Tech project?')">What is Social Transition in Women Tech project?</button>
                <button type="button" class="btn btn-outline-light" onclick="sendMessage('Which documents I need to provide?')">Which documents I need to provide?</button> </p>
            </div>
            
            <div class="incoming message">
              <div class="loading-lines"></div>
              <div class="loading-lines"></div>
              <div class="loading-lines"></div>
              <div class="loading-lines"></div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type your message...">
            <!-- <button id="send-button">Send</button> -->
            <button id="send-button">
                <i class="fas fa-paper-plane" ></i>
                <div class="typing-indicator">...</div>
            </button>
    
        </div>
    </div>
    <button style="width: 60px;height: 60px;" id="chat-button" data-bs-toggle="tooltip" data-bs-placement="right" title="Chat with Splora Assistent" type="button" class="chat-button active">
        <i class="fa-solid fa-robot"></i>
        <!-- <i class="fa-regular fa-comment-dots"></i> -->
      </button>
      
      <script src="chat-script.js"></script>
</body>
</html>
